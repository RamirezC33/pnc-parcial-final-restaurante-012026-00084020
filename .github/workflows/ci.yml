name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Permite cancelar ejecuciones viejas de la misma rama.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  #  1) Compilar y probar el proyecto
  # ------------------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Dar permisos a gradlew
        run: chmod +x ./gradlew

      - name: Compilar y ejecutar pruebas
        run: ./gradlew build --no-daemon

      - name: Publicar resultados de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test
          if-no-files-found: ignore

  # ------------------------------------------------------------------
  #  2) Escaneo de secretos expuestos  (falla si encuentra alguno)
  # ------------------------------------------------------------------
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecutar gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  #  3) Escaneo de vulnerabilidades  (falla si hay CRITICAL)
  # ------------------------------------------------------------------
  vulnerability-scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Escanear dependencias y archivos con Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: '1'         # Falla el pipeline si hay vulnerabilidades críticas.
          ignore-unfixed: true
